<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>Whack-a-Mole – Game Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="payment.css"><link rel="stylesheet" href="gamezone.css">
    <style>
        .mole-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; width:310px; max-width:100%; }
        .hole { background:rgba(0,0,0,0.35); border-radius:50%; width:90px; height:90px; display:flex; align-items:center; justify-content:center; font-size:2.5rem; cursor:pointer; border:2px solid rgba(255,255,255,0.07); transition:transform .08s; position:relative; overflow:hidden; user-select:none; -webkit-tap-highlight-color:transparent; }
        .hole .mole { position:absolute; bottom:-100%; transition:bottom .18s; font-size:2.4rem; }
        .hole.active .mole { bottom:5%; }
        .hole:active { transform:scale(.92); }
        .timer-bar { width:310px; max-width:100%; height:8px; background:rgba(255,255,255,0.08); border-radius:99px; overflow:hidden; margin-bottom:18px; }
        .timer-fill { height:100%; background:linear-gradient(90deg,#10b981,#6366f1); border-radius:99px; transition:width .1s linear; }
    </style>
</head>
<body>
<div class="bg-orb orb-1"></div><div class="bg-orb orb-2"></div>
<div class="game-page-wrapper fade-in-up visible">
    <div class="game-page-header"><a href="index.html" class="back-btn">← Back</a><h2 class="game-page-title">🔨 Whack-a-Mole</h2></div>
    <div class="score-row">
        <div class="score-pill">Score: <span id="score">0</span></div>
        <div class="score-pill">Time: <span id="timer">30</span>s</div>
        <div class="score-pill">Best: <span id="best">0</span></div>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <div class="mole-grid" id="grid">
        <div class="hole" data-i="0"><span class="mole">🦔</span></div>
        <div class="hole" data-i="1"><span class="mole">🦔</span></div>
        <div class="hole" data-i="2"><span class="mole">🦔</span></div>
        <div class="hole" data-i="3"><span class="mole">🦔</span></div>
        <div class="hole" data-i="4"><span class="mole">🦔</span></div>
        <div class="hole" data-i="5"><span class="mole">🦔</span></div>
        <div class="hole" data-i="6"><span class="mole">🦔</span></div>
        <div class="hole" data-i="7"><span class="mole">🦔</span></div>
        <div class="hole" data-i="8"><span class="mole">🦔</span></div>
    </div>
    <button class="action-btn" id="startBtn" style="margin-top:20px">▶ Start Game</button>
</div>
<script>
    let score=0,timeLeft=30,best=+localStorage.getItem('wamBest')||0,running=false,moleTimer,countTimer;
    const holes=[...document.querySelectorAll('.hole')];
    const scoreEl=document.getElementById('score'),timerEl=document.getElementById('timer'),bestEl=document.getElementById('best'),fill=document.getElementById('timerFill'),btn=document.getElementById('startBtn');
    bestEl.textContent=best;
    let lastHole=-1;
    function showMole(){
        holes.forEach(h=>h.classList.remove('active'));
        let i;do{i=Math.floor(Math.random()*9);}while(i===lastHole);
        lastHole=i; holes[i].classList.add('active');
        const delay=Math.max(500,1000-score*8);
        moleTimer=setTimeout(showMole,delay);
    }
    function start(){
        btn.style.display='none'; score=0; timeLeft=30; scoreEl.textContent=0; timerEl.textContent=30; fill.style.width='100%'; running=true;
        showMole();
        countTimer=setInterval(()=>{
            timeLeft--; timerEl.textContent=timeLeft; fill.style.width=(timeLeft/30*100)+'%';
            if(timeLeft<=0){
                clearInterval(countTimer); clearTimeout(moleTimer); running=false;
                holes.forEach(h=>h.classList.remove('active'));
                if(score>best){best=score;localStorage.setItem('wamBest',best);bestEl.textContent=best;}
                btn.textContent='Play Again'; btn.style.display='block';
            }
        },1000);
    }
    holes.forEach(h=>{
        const whack=()=>{if(!running||!h.classList.contains('active'))return; h.classList.remove('active'); score++; scoreEl.textContent=score; h.querySelector('.mole').textContent='💥'; setTimeout(()=>h.querySelector('.mole').textContent='🦔',300);};
        h.addEventListener('click',whack); h.addEventListener('touchend',e=>{e.preventDefault();whack();},{passive:false});
    });
    btn.addEventListener('click',start);
</script>
</body></html>
