<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>Color Drop – Game Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="payment.css"><link rel="stylesheet" href="gamezone.css">
    <style>
        .cf-target{width:100px;height:100px;border-radius:50%;border:4px solid rgba(255,255,255,0.2);margin:16px auto;transition:background .2s;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:.06em;}
        .cf-options{display:flex;gap:16px;margin:16px 0;}
        .cf-opt{width:72px;height:72px;border-radius:50%;border:3px solid rgba(255,255,255,0.15);cursor:pointer;transition:transform .12s,box-shadow .12s;-webkit-tap-highlight-color:transparent;}
        .cf-opt:active{transform:scale(.88);}
        .cf-opt.selected{box-shadow:0 0 0 4px rgba(255,255,255,0.5);}
        .timer-bar{width:300px;max-width:95vw;height:8px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;margin-bottom:8px;}
        .timer-fill{height:100%;background:linear-gradient(90deg,#10b981,#6366f1);border-radius:99px;}
        .cf-label{font-size:.9rem;color:#64748b;margin-bottom:4px;text-align:center;}
    </style>
</head>
<body>
<div class="bg-orb orb-1"></div><div class="bg-orb orb-2"></div>
<div class="game-page-wrapper fade-in-up visible">
    <div class="game-page-header"><a href="index.html" class="back-btn">← Back</a><h2 class="game-page-title">🎯 Color Drop</h2></div>
    <div class="score-row">
        <div class="score-pill">Score: <span id="score">0</span></div>
        <div class="score-pill">Streak: <span id="streak">0</span></div>
        <div class="score-pill">Best: <span id="best">0</span></div>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="fill" style="width:100%"></div></div>
    <p class="cf-label">Match this color:</p>
    <div class="cf-target" id="target">Target</div>
    <p class="cf-label">Tap the matching color:</p>
    <div class="cf-options" id="options"></div>
    <button class="action-btn" id="startBtn">▶ Start Game</button>
</div>
<script>
    const COLORS=[
        {name:'Red',hex:'#ef4444'},{name:'Green',hex:'#10b981'},{name:'Blue',hex:'#6366f1'},
        {name:'Yellow',hex:'#eab308'},{name:'Pink',hex:'#ec4899'},{name:'Orange',hex:'#f97316'},
        {name:'Purple',hex:'#a855f7'},{name:'Cyan',hex:'#06b6d4'},{name:'Lime',hex:'#84cc16'},
        {name:'Rose',hex:'#fb7185'}
    ];
    let score,streak,best=+localStorage.getItem('cfBest')||0,timeLeft,timer,running=false,locked=false;
    const targetEl=document.getElementById('target'),optionsEl=document.getElementById('options'),scoreEl=document.getElementById('score'),streakEl=document.getElementById('streak'),bestEl=document.getElementById('best'),fill=document.getElementById('fill'),startBtn=document.getElementById('startBtn');
    bestEl.textContent=best;
    const TIME=6;

    function shuffle(a){return[...a].sort(()=>Math.random()-.5);}

    function nextQ(){
        locked=false;
        const correct=COLORS[Math.floor(Math.random()*COLORS.length)];
        const wrong=shuffle(COLORS.filter(c=>c.hex!==correct.hex)).slice(0,3);
        const choices=shuffle([correct,...wrong]);
        targetEl.style.background=correct.hex;

        timeLeft=TIME;
        fill.style.transition='none'; fill.style.width='100%';
        setTimeout(()=>{fill.style.transition='width .05s linear';},20);
        clearInterval(timer);
        timer=setInterval(()=>{
            timeLeft-=0.05; fill.style.width=(timeLeft/TIME*100)+'%';
            if(timeLeft<=0){clearInterval(timer);if(!locked){locked=true;streak=0;streakEl.textContent=0;markOptions(null,correct.hex);setTimeout(nextQ,800);}}
        },50);

        optionsEl.innerHTML='';
        choices.forEach(c=>{
            const btn=document.createElement('div'); btn.className='cf-opt'; btn.style.background=c.hex;
            const handle=()=>{
                if(locked)return; locked=true; clearInterval(timer);
                if(c.hex===correct.hex){score+=10+streak*2;streak++;scoreEl.textContent=score;streakEl.textContent=streak;if(score>best){best=score;localStorage.setItem('cfBest',best);bestEl.textContent=best;}markOptions(c.hex,correct.hex);setTimeout(nextQ,500);}
                else{streak=0;streakEl.textContent=0;markOptions(c.hex,correct.hex);setTimeout(nextQ,700);}
            };
            btn.addEventListener('click',handle);
            btn.addEventListener('touchend',e=>{e.preventDefault();handle();},{passive:false});
            optionsEl.appendChild(btn);
        });
    }

    function markOptions(chosen,correct){
        [...optionsEl.children].forEach(b=>{
            if(b.style.background===correct||b.style.backgroundColor===chosen){
                b.style.outline=b.style.background===correct?'4px solid #fff':'4px solid #ef4444';
            }
        });
    }

    startBtn.addEventListener('click',()=>{startBtn.style.display='none';score=0;streak=0;scoreEl.textContent=0;streakEl.textContent=0;running=true;nextQ();});
</script>
</body></html>
