<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dino Run – Game Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="payment.css">
    <link rel="stylesheet" href="gamezone.css">
    <style>
        #dino-canvas { cursor: pointer; }
        .jump-hint { color:#475569; font-size:0.82rem; margin-top:10px; text-align:center; }
    </style>
</head>
<body>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div class="game-page-wrapper fade-in-up visible">
    <div class="game-page-header">
        <a href="index.html" class="back-btn">← Back</a>
        <h2 class="game-page-title">🦕 Dino Run</h2>
    </div>

    <div class="score-row">
        <div class="score-pill">Score: <span id="score">0</span></div>
        <div class="score-pill">Best: <span id="best">0</span></div>
    </div>

    <canvas id="dino-canvas" class="game-canvas" width="380" height="200"></canvas>
    <p class="jump-hint">Tap canvas / Space / Screen to jump · Double jump allowed!</p>
    <button class="action-btn" id="jumpBtn">▲ Jump</button>
</div>

<script>
    const canvas = document.getElementById('dino-canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const jumpBtn = document.getElementById('jumpBtn');

    let best = +localStorage.getItem('dinoBest') || 0;
    bestEl.textContent = best;

    const GROUND = canvas.height - 30;
    let dino, obstacles, score, speed, frame, running, raf, jumpCount;

    function init() {
        dino = { x: 50, y: GROUND, w: 28, h: 36, vy: 0, jumps: 0 };
        obstacles = [];
        score = 0; speed = 4; frame = 0;
        running = true;
        scoreEl.textContent = 0;
    }

    function jump() {
        if (!running) { cancelAnimationFrame(raf); init(); loop(); return; }
        if (dino.jumps < 2) { dino.vy = -11; dino.jumps++; }
    }

    function spawnObstacle() {
        const h = 22 + Math.random() * 22;
        obstacles.push({ x: canvas.width, y: GROUND + 36 - h, w: 18 + Math.random()*12, h });
    }

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Ground
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.fillRect(0, GROUND + 36, canvas.width, 2);

        // Dino body
        ctx.fillStyle = '#34d399';
        ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
        // Dino eye
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(dino.x + dino.w - 8, dino.y + 6, 5, 5);
        // Dino legs animation
        const legOff = frame % 14 < 7 ? 4 : -4;
        ctx.fillRect(dino.x + 4, dino.y + dino.h, 7, 8 + legOff);
        ctx.fillRect(dino.x + 16, dino.y + dino.h, 7, 8 - legOff);

        // Physics
        dino.vy += 0.6;
        dino.y += dino.vy;
        if (dino.y >= GROUND) { dino.y = GROUND; dino.vy = 0; dino.jumps = 0; }

        // Obstacles
        if (frame % Math.max(55, 100 - Math.floor(score/50)) === 0) spawnObstacle();
        obstacles.forEach((o, idx) => {
            o.x -= speed;
            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.roundRect(o.x, o.y, o.w, o.h, 4);
            ctx.fill();
            // Collision
            if (dino.x + dino.w - 4 > o.x + 4 && dino.x + 4 < o.x + o.w - 4 &&
                dino.y + dino.h > o.y + 4 && dino.y < o.y + o.h) {
                running = false;
                if (score > best) { best = score; localStorage.setItem('dinoBest', best); bestEl.textContent = best; }
                ctx.fillStyle = 'rgba(0,0,0,0.65)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white'; ctx.textAlign = 'center';
                ctx.font = 'bold 22px Outfit,sans-serif'; ctx.fillText('Game Over! 💀', canvas.width/2, canvas.height/2 - 12);
                ctx.font = '15px Outfit,sans-serif'; ctx.fillStyle = '#94a3b8';
                ctx.fillText('Tap to restart', canvas.width/2, canvas.height/2 + 16);
                return;
            }
            if (o.x + o.w < 0) obstacles.splice(idx, 1);
        });
        if (!running) return;

        // Score
        frame++;
        if (frame % 6 === 0) { score++; scoreEl.textContent = score; }
        speed = 4 + score / 80;

        // Score on canvas
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        ctx.font = 'bold 14px Outfit,sans-serif'; ctx.textAlign = 'right';
        ctx.fillText(score, canvas.width - 12, 24);

        raf = requestAnimationFrame(loop);
    }

    // Draw start screen
    ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.textAlign = 'center';
    ctx.font = 'bold 32px Outfit,sans-serif'; ctx.fillText('🦕', canvas.width/2, canvas.height/2 - 10);
    ctx.font = '15px Outfit,sans-serif'; ctx.fillStyle = '#64748b';
    ctx.fillText('Tap to Start', canvas.width/2, canvas.height/2 + 20);

    canvas.addEventListener('click', jump);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });
    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
    jumpBtn.addEventListener('click', jump);
    jumpBtn.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });
</script>
</body>
</html>
