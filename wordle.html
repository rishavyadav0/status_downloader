<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>Wordle – Game Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="payment.css"><link rel="stylesheet" href="gamezone.css">
    <style>
        .wordle-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;}
        .wordle-row{display:flex;gap:6px;}
        .wordle-cell{width:52px;height:52px;border-radius:10px;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;color:#f1f5f9;transition:background .3s,border-color .3s;text-transform:uppercase;}
        .wordle-cell.correct{background:#10b981;border-color:#10b981;}
        .wordle-cell.present{background:#f59e0b;border-color:#f59e0b;}
        .wordle-cell.absent{background:#374151;border-color:#374151;}
        .wordle-cell.filled{border-color:rgba(255,255,255,0.4);}
        .keyboard{display:flex;flex-direction:column;gap:6px;align-items:center;}
        .kb-row{display:flex;gap:5px;}
        .kb-key{min-width:30px;height:42px;border-radius:7px;background:rgba(255,255,255,0.12);border:none;color:#f1f5f9;font-size:.82rem;font-weight:700;cursor:pointer;padding:0 6px;font-family:'Outfit',sans-serif;-webkit-tap-highlight-color:transparent;transition:background .15s;}
        .kb-key.wide{min-width:48px;}
        .kb-key:active{background:rgba(255,255,255,0.25);}
        .kb-key.correct{background:#10b981;} .kb-key.present{background:#f59e0b;} .kb-key.absent{background:#374151;}
        .wordle-status{font-size:1rem;font-weight:700;text-align:center;color:#e2e8f0;min-height:26px;margin-bottom:8px;}
    </style>
</head>
<body>
<div class="bg-orb orb-1"></div><div class="bg-orb orb-2"></div>
<div class="game-page-wrapper fade-in-up visible">
    <div class="game-page-header"><a href="index.html" class="back-btn">← Back</a><h2 class="game-page-title">📝 Wordle</h2></div>
    <div class="wordle-status" id="status">Guess the 5-letter word!</div>
    <div class="wordle-grid" id="wGrid"></div>
    <div class="keyboard" id="keyboard"></div>
    <button class="action-btn" id="restartBtn" style="margin-top:14px;display:none">🔄 New Word</button>
</div>
<script>
    const WORDS=['crane','light','stone','brave','plant','ghost','water','flame','cloud','storm','blade','frost','quiet','shiny','sugar','grape','tiger','jewel','piano','smile','round','swing','green','black','space','bread','drift','pride','shake','beach'];
    let secret,currentRow,currentCol,board,keyState,over;
    const ROWS=6,COLS=5;
    const gridEl=document.getElementById('wGrid'),kbEl=document.getElementById('keyboard'),statusEl=document.getElementById('status'),restartBtn=document.getElementById('restartBtn');

    const ROWS_KB=[['q','w','e','r','t','y','u','i','o','p'],['a','s','d','f','g','h','j','k','l'],['Enter','z','x','c','v','b','n','m','⌫']];

    function init(){
        secret=WORDS[Math.floor(Math.random()*WORDS.length)];
        currentRow=0; currentCol=0; over=false;
        board=Array.from({length:ROWS},()=>Array(COLS).fill(''));
        keyState={};
        statusEl.textContent='Guess the 5-letter word!'; restartBtn.style.display='none';
        renderGrid(); renderKB();
    }

    function renderGrid(){
        gridEl.innerHTML='';
        board.forEach((row,r)=>{
            const rowEl=document.createElement('div'); rowEl.className='wordle-row';
            row.forEach((ch,c)=>{
                const cell=document.createElement('div');
                cell.className='wordle-cell'; cell.textContent=ch.toUpperCase();
                if(ch)cell.classList.add('filled');
                gridEl.appendChild(cell);
            });
            gridEl.appendChild(rowEl);
        });
    }

    function renderKB(){
        kbEl.innerHTML='';
        ROWS_KB.forEach(keys=>{
            const row=document.createElement('div'); row.className='kb-row';
            keys.forEach(k=>{
                const btn=document.createElement('button'); btn.className='kb-key';
                if(k==='Enter'||k==='⌫')btn.classList.add('wide');
                btn.textContent=k;
                if(keyState[k.toLowerCase()])btn.classList.add(keyState[k.toLowerCase()]);
                btn.addEventListener('click',()=>input(k));
                btn.addEventListener('touchend',e=>{e.preventDefault();input(k);},{passive:false});
                row.appendChild(btn);
            });
            kbEl.appendChild(row);
        });
    }

    function input(key){
        if(over)return;
        if(key==='⌫'||key==='Backspace'){if(currentCol>0){currentCol--;board[currentRow][currentCol]='';}}
        else if(key==='Enter'){submit();}
        else if(/^[a-zA-Z]$/.test(key)&&currentCol<COLS){board[currentRow][currentCol]=key.toLowerCase();currentCol++;}
        renderGrid(); renderKB();
    }

    function submit(){
        if(currentCol<COLS){statusEl.textContent='Not enough letters!';return;}
        const guess=board[currentRow].join('');
        const result=Array(COLS).fill('absent');
        const secretArr=secret.split(''),used=Array(COLS).fill(false);
        guess.split('').forEach((ch,i)=>{if(ch===secretArr[i]){result[i]='correct';used[i]=true;}});
        guess.split('').forEach((ch,i)=>{
            if(result[i]==='correct')return;
            const j=secretArr.findIndex((s,k)=>s===ch&&!used[k]);
            if(j!==-1){result[i]='present';used[j]=true;}
        });
        // Apply colors to grid
        const cells=[...gridEl.querySelectorAll('.wordle-cell')];
        const rowCells=cells.slice(currentRow*COLS,(currentRow+1)*COLS);
        result.forEach((r,i)=>{rowCells[i].className='wordle-cell '+r;});
        // Key state
        result.forEach((r,i)=>{
            const ch=guess[i];
            if(r==='correct')keyState[ch]='correct';
            else if(r==='present'&&keyState[ch]!=='correct')keyState[ch]='present';
            else if(r==='absent'&&!keyState[ch])keyState[ch]='absent';
        });
        renderKB();
        if(guess===secret){over=true;statusEl.textContent='🎉 Brilliant! You got it!';restartBtn.style.display='block';return;}
        currentRow++; currentCol=0;
        if(currentRow===ROWS){over=true;statusEl.textContent='😞 Answer: '+secret.toUpperCase();restartBtn.style.display='block';}
    }

    document.addEventListener('keydown',e=>{
        if(e.key==='Backspace')input('⌫');
        else if(e.key==='Enter')input('Enter');
        else if(/^[a-zA-Z]$/.test(e.key))input(e.key);
    });
    restartBtn.addEventListener('click',init);
    init();
</script>
</body></html>
