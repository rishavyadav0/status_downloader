<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Notice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="payment.css">
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="notice-wrapper fade-in-up">
        <div class="notice-container glass-card">
            <div class="notice-header">
                <div class="icon-wrapper">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </div>
                <h1>Service Notice: Payment Required</h1>
            </div>
            
            <div class="notice-body">
                <p>Access to this website has been temporarily suspended due to outstanding administrative fees. Please settle the remaining balance to restore full functionality.</p>
                <p class="sub-text" style="margin-top: 15px;">If you believe this is an error, please contact the developer immediately.</p>
            </div>
        </div>
    </div>
    <script>
        // Simple fade-in animation
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.querySelector('.notice-wrapper').classList.add('visible');
            }, 100);
        });
    </script>
</body>
</html>
