<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Memory Match – Game Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="payment.css">
    <link rel="stylesheet" href="gamezone.css">
    <style>
        .mem-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 320px;
            max-width: 100%;
        }
        .mem-card {
            width: 68px; height: 68px;
            perspective: 600px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .mem-card-inner {
            width:100%; height:100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.35s ease;
            border-radius: 12px;
        }
        .mem-card.flipped .mem-card-inner { transform: rotateY(180deg); }
        .mem-card-front, .mem-card-back {
            position: absolute; inset: 0;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .mem-card-front {
            background: rgba(255,255,255,0.06);
            border: 2px solid rgba(255,255,255,0.1);
            font-size: 1.6rem;
        }
        .mem-card-back {
            background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(139,92,246,0.3));
            border: 2px solid rgba(99,102,241,0.3);
            transform: rotateY(180deg);
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .mem-card.matched .mem-card-front {
            background: rgba(16,185,129,0.15);
            border-color: rgba(16,185,129,0.4);
        }
        .mem-stats {
            display: flex; gap: 12px; margin-bottom: 18px;
        }
        .mem-stat {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 8px 16px;
            text-align: center;
        }
        .mem-stat .lbl { font-size:0.68rem; color:#64748b; text-transform:uppercase; letter-spacing:.08em; font-weight:700; }
        .mem-stat .val { font-size:1.2rem; font-weight:800; color:#f1f5f9; }
        .mem-status { color:#94a3b8; font-size:0.9rem; margin-bottom:14px; text-align:center; min-height:22px; }
    </style>
</head>
<body>
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<div class="game-page-wrapper fade-in-up visible">
    <div class="game-page-header">
        <a href="index.html" class="back-btn">← Back</a>
        <h2 class="game-page-title">🃏 Memory Match</h2>
    </div>

    <div class="mem-stats">
        <div class="mem-stat"><div class="lbl">Moves</div><div class="val" id="moves">0</div></div>
        <div class="mem-stat"><div class="lbl">Matches</div><div class="val" id="matches">0</div></div>
        <div class="mem-stat"><div class="lbl">Best</div><div class="val" id="bestMoves">—</div></div>
    </div>

    <div class="mem-status" id="memStatus">Tap a card to begin!</div>
    <div class="mem-grid" id="memGrid"></div>
    <button class="action-btn" id="memRestart" style="margin-top:20px">🔀 Shuffle & Restart</button>
</div>

<script>
    const EMOJIS = ['🚀','🎯','🌈','🔥','⚡','💎','🎸','🦋'];
    let cards = [], flipped = [], matched = 0, moves = 0, locked = false;
    let best = localStorage.getItem('memBest') ? +localStorage.getItem('memBest') : null;

    const grid = document.getElementById('memGrid');
    const movesEl = document.getElementById('moves');
    const matchesEl = document.getElementById('matches');
    const bestEl = document.getElementById('bestMoves');
    const statusEl = document.getElementById('memStatus');

    bestEl.textContent = best !== null ? best : '—';

    function shuffle(arr) { return arr.sort(()=>Math.random()-.5); }

    function build() {
        const pairs = shuffle([...EMOJIS,...EMOJIS]);
        grid.innerHTML=''; cards=[]; flipped=[]; matched=0; moves=0; locked=false;
        movesEl.textContent=0; matchesEl.textContent=0; statusEl.textContent='Tap a card to begin!';

        pairs.forEach((emoji,i) => {
            const card = document.createElement('div');
            card.className='mem-card';
            card.dataset.emoji=emoji;
            card.dataset.idx=i;
            card.innerHTML=`
                <div class="mem-card-inner">
                    <div class="mem-card-back">?</div>
                    <div class="mem-card-front">${emoji}</div>
                </div>`;
            card.addEventListener('click', () => flip(card));
            card.addEventListener('touchend', e=>{ e.preventDefault(); flip(card); });
            grid.appendChild(card);
            cards.push(card);
        });
    }

    function flip(card) {
        if(locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
        card.classList.add('flipped');
        flipped.push(card);
        if(flipped.length===2) check();
    }

    function check() {
        locked=true; moves++;
        movesEl.textContent=moves;
        const [a,b] = flipped;
        if(a.dataset.emoji===b.dataset.emoji) {
            a.classList.add('matched'); b.classList.add('matched');
            matched++;
            matchesEl.textContent=matched;
            statusEl.textContent = matched===8 ? '🎉 Brilliant! All matched!' : `✅ Match! Keep going!`;
            flipped=[];
            if(matched===8) {
                if(best===null||moves<best){ best=moves; localStorage.setItem('memBest',best); bestEl.textContent=best; }
            }
            locked=false;
        } else {
            statusEl.textContent='❌ Not a match — try again!';
            setTimeout(()=>{
                a.classList.remove('flipped'); b.classList.remove('flipped');
                flipped=[]; locked=false; statusEl.textContent='Tap a card to continue';
            }, 900);
        }
    }

    document.getElementById('memRestart').addEventListener('click', build);
    build();
</script>
</body>
</html>
